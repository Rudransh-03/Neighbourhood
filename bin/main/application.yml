spring:
  application:
    name: neighbourhood-intelligence

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/neighbourhood}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      keepalive-time: 300000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  transaction:
    default-timeout: 30

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-threads: 200
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.neighbourhood: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/app.log}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  google:
    geocoding-api-key: ${GOOGLE_GEOCODING_API_KEY}
    places-api-key: ${GOOGLE_PLACES_API_KEY}
    distance-matrix-api-key: ${GOOGLE_DISTANCE_MATRIX_API_KEY}
    geocoding-base-url: https://maps.googleapis.com/maps/api/geocode/json
    places-base-url: https://maps.googleapis.com/maps/api/place/nearbysearch/json
    distance-matrix-base-url: https://maps.googleapis.com/maps/api/distancematrix/json
    api-timeout-seconds: 10

  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
    api-timeout-seconds: 30

  cache:
    region-ttl-days: 30
    traffic-ttl-days: 180
    summary-ttl-days: 30

  search:
    radius-meters: 5000
    geohash-precision: 6

  scoring:
    min-reviews-for-sentiment: 5
    amenities-weight: 0.30
    connectivity-weight: 0.25
    traffic-weight: 0.20
    user-rating-weight: 0.25

  thresholds:
    metro-max-distance-m: 30000
    mall-max-distance-m: 40000
    business-hub-search-radius-m: 25000

  profanity:
    words: badword1,badword2,offensive1,offensive2

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    search-requests-per-minute: 30
    review-requests-per-minute: 10

  security:
    google-client-id: ${GOOGLE_CLIENT_ID}